workflows:
  ios-debug:
    name: iOS Debug Build (no IPA)
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: 16.0
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
        working_directory: im_demo

      - name: Patch roomkit podspec NEXKitBase
        script: |
          set -eo pipefail
          patch_roomkit_podspec() {
            local file="$1"
            [ -f "$file" ] || return 0
            if grep -q "s.dependency 'NEXKitBase'" "$file"; then
              echo "NEXKitBase already exists: $file"
              return 0
            fi
            if grep -q 's.dependency "NERoomKit/Base_FCS_Special", "1.43.0"' "$file"; then
              awk '{print} /s.dependency "NERoomKit\/Base_FCS_Special", "1.43.0"/ {print "      s.dependency '\''NEXKitBase'\''"}' "$file" > "$file.tmp"
              mv "$file.tmp" "$file"
              echo "PATCHED: $file"
            else
              echo "SKIP(no needle): $file"
            fi
          }
          patch_roomkit_podspec "$HOME/.pub-cache/hosted/pub.dev/netease_roomkit-1.43.0/ios/netease_roomkit.podspec"
          patch_roomkit_podspec "im_demo/ios/.symlinks/plugins/netease_roomkit/ios/netease_roomkit.podspec"

      - name: Clean & Install Pods
        script: |
          set -eo pipefail
          cd im_demo/ios
          rm -rf Pods Podfile.lock
          for attempt in 1 2 3; do
            if pod install --verbose; then
              break
            fi
            echo "pod install failed (attempt $attempt), retry in 25s..."
            sleep 25
            [ "$attempt" -eq 3 ] && exit 1
          done

      - name: Dedupe CocoaPods embed outputs
        script: ruby im_demo/ios/dedupe_cocoapods_embed.rb im_demo/ios/Pods

      - name: Build iOS (unsigned app bundle)
        script: |
          set -eo pipefail
          cd im_demo
          flutter build ios --debug --no-codesign

    artifacts:
      - im_demo/build/ios/iphoneos/Runner.app
      - im_demo/ios/Podfile.lock
      - /tmp/xcodebuild_logs/*.log

  ios-ipa:
    name: iOS Release IPA (蒲公英专用)
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: 16.0
      cocoapods: default
      ios_signing:
        distribution_type: ad_hoc        # 关键：改成蒲公英需要的 ad_hoc
        bundle_identifier: com.hestia.n168chat.app.flutter.im

    scripts:
      - name: Get Flutter packages
        script: flutter pub get
        working_directory: im_demo

      - name: Patch roomkit podspec NEXKitBase
        script: |
          set -eo pipefail
          patch_roomkit_podspec() {
            local file="$1"
            [ -f "$file" ] || return 0
            if grep -q "s.dependency 'NEXKitBase'" "$file"; then
              echo "NEXKitBase already exists: $file"
              return 0
            fi
            if grep -q 's.dependency "NERoomKit/Base_FCS_Special", "1.43.0"' "$file"; then
              awk '{print} /s.dependency "NERoomKit\/Base_FCS_Special", "1.43.0"/ {print "      s.dependency '\''NEXKitBase'\''"}' "$file" > "$file.tmp"
              mv "$file.tmp" "$file"
              echo "PATCHED: $file"
            else
              echo "SKIP(no needle): $file"
            fi
          }
          patch_roomkit_podspec "$HOME/.pub-cache/hosted/pub.dev/netease_roomkit-1.43.0/ios/netease_roomkit.podspec"
          patch_roomkit_podspec "im_demo/ios/.symlinks/plugins/netease_roomkit/ios/netease_roomkit.podspec"

      - name: Clean & Install Pods
        script: |
          set -eo pipefail
          cd im_demo/ios
          rm -rf Pods Podfile.lock
          for attempt in 1 2 3; do
            if pod install --verbose; then
              break
            fi
            echo "pod install failed (attempt $attempt), retry in 25s..."
            sleep 25
            [ "$attempt" -eq 3 ] && exit 1
          done

      - name: Dedupe CocoaPods embed outputs
        script: ruby im_demo/ios/dedupe_cocoapods_embed.rb im_demo/Pods

      # 关键：移除了所有 app-store-connect 代码！
      - name: Build IPA for 蒲公英 (Ad-Hoc)
        script: |
          cd im_demo
          flutter build ipa --release

    artifacts:
      - im_demo/build/ios/ipa/*.ipa

    publishing:
      # 完全关闭 TestFlight
      # 只保留蒲公英上传
      scripts:
        - name: 上传 IPA 到蒲公英
          script: |
            IPA_PATH=$(find im_demo/build/ios/ipa -name "*.ipa" | head -1)
            echo "找到IPA文件: $IPA_PATH"
            curl -F "file=@$IPA_PATH" \
            -F "_api_key=64da53cb5abab89565c027d5426ba36a" \
            https://upload.pgyer.com/apiv2/app/upload