workflows:
  ios-debug:
    name: iOS Debug Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
        working_directory: im_demo

      # 👇 强制把整个项目升级到 iOS 13.0（解决所有版本报错）
      - name: Force iOS 13.0 + fix NERtcSDK
        script: |
          cd im_demo/ios
          sed -i '' 's/platform :ios, .*/platform :ios, "13.0"/' Podfile
          echo "pod 'NERtcSDK', '5.9.10'" >> Podfile

      - name: Clean Pods & Install
        script: |
          cd im_demo/ios
          rm -rf Pods Podfile.lock
          pod repo update
          pod install --repo-update

      - name: Build iOS (no codesign)
        script: flutter build ios --debug --no-codesign
        working_directory: im_demo

    artifacts:
      - im_demo/build/ios/ipa/*.ipa
      - im_demo/build/ios/iphoneos/*.app