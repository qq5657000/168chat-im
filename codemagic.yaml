# 蒲公英：当前 ios-ipa 为「无签名」产物，无法在真机完成安装（见下方说明）。
# TestFlight：使用 ios-testflight，需在 Codemagic 绑定 App Store Connect API 密钥（integrations）并配置 App 记录。

workflows:
  ios-ipa:
    name: iOS Release IPA (蒲公英专用 - 无签名)
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: 16.0
      cocoapods: default
      groups:
        - pgy  # 加上这一行！！！导入你存放变量的pgy分组

    scripts:
      - name: Get Flutter packages
        script: flutter pub get
        working_directory: im_demo

      - name: Patch roomkit podspec NEXKitBase
        script: |
          set -eo pipefail
          patch_roomkit_podspec() {
            local file="$1"
            [ -f "$file" ] || return 0
            if grep -q "s.dependency 'NEXKitBase'" "$file"; then
              echo "NEXKitBase already exists: $file"
              return 0
            fi
            if grep -q 's.dependency "NERoomKit/Base_FCS_Special", "1.43.0"' "$file"; then
              awk '{print} /s.dependency "NERoomKit\/Base_FCS_Special", "1.43.0"/ {print "      s.dependency '\''NEXKitBase'\''"}' "$file" > "$file.tmp"
              mv "$file.tmp" "$file"
              echo "PATCHED: $file"
            fi
          }
          patch_roomkit_podspec "$HOME/.pub-cache/hosted/pub.dev/netease_roomkit-1.43.0/ios/netease_roomkit.podspec"
          patch_roomkit_podspec "im_demo/ios/.symlinks/plugins/netease_roomkit/ios/netease_roomkit.podspec"

      - name: Clean & Install Pods
        script: |
          cd im_demo/ios
          rm -rf Pods Podfile.lock
          pod install

      - name: Dedupe CocoaPods embed outputs
        script: ruby im_demo/ios/dedupe_cocoapods_embed.rb im_demo/ios/Pods

      - name: Build unsigned IPA
        script: |
          set -eo pipefail
          cd im_demo
          flutter build ios --release --no-codesign
          mkdir -p build/ios/ipa
          cd build/ios
          rm -rf Payload
          mkdir Payload
          cp -R iphoneos/Runner.app Payload/
          /usr/bin/zip -r ipa/Runner.ipa Payload
          rm -rf Payload

    artifacts:
      - im_demo/build/ios/ipa/*.ipa

    publishing:
      scripts:
        - name: Upload to PGYER
          script: |
            set -eo pipefail
            IPA_PATH="$CM_BUILD_DIR/im_demo/build/ios/ipa/Runner.ipa"
            if [ -z "${PGYER_API_KEY:-}" ]; then
              echo "请在 Codemagic 环境变量中配置 PGYER_API_KEY（不要写进仓库）。" >&2
              exit 1
            fi
            echo "上传 IPA: $IPA_PATH"
            curl -F "file=@$IPA_PATH" \
              -F "_api_key=$PGYER_API_KEY" \
              https://upload.pgyer.com/apiv2/app/upload

  ios-testflight:
    name: iOS TestFlight (签名 + 上传 App Store Connect)
    max_build_duration: 120
    instance_type: mac_mini_m2
    # 与 Codemagic「Teams → Integrations → Developer Portal」里添加的 App Store Connect API key 名称一致（例如 codemagic）
    integrations:
      app_store_connect: codemagic
    environment:
      flutter: stable
      xcode: 16.0
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.hestia.n168chat.app.flutter.im

    scripts:
      - name: Get Flutter packages
        script: flutter pub get
        working_directory: im_demo

      - name: Patch roomkit podspec NEXKitBase
        script: |
          set -eo pipefail
          patch_roomkit_podspec() {
            local file="$1"
            [ -f "$file" ] || return 0
            if grep -q "s.dependency 'NEXKitBase'" "$file"; then
              echo "NEXKitBase already exists: $file"
              return 0
            fi
            if grep -q 's.dependency "NERoomKit/Base_FCS_Special", "1.43.0"' "$file"; then
              awk '{print} /s.dependency "NERoomKit\/Base_FCS_Special", "1.43.0"/ {print "      s.dependency '\''NEXKitBase'\''"}' "$file" > "$file.tmp"
              mv "$file.tmp" "$file"
              echo "PATCHED: $file"
            fi
          }
          patch_roomkit_podspec "$HOME/.pub-cache/hosted/pub.dev/netease_roomkit-1.43.0/ios/netease_roomkit.podspec"
          patch_roomkit_podspec "im_demo/ios/.symlinks/plugins/netease_roomkit/ios/netease_roomkit.podspec"

      - name: Clean & Install Pods
        script: |
          set -eo pipefail
          cd im_demo/ios
          rm -rf Pods Podfile.lock
          for attempt in 1 2 3; do
            if pod install --verbose; then
              break
            fi
            echo "pod install failed (attempt $attempt), retry in 25s..."
            sleep 25
            [ "$attempt" -eq 3 ] && exit 1
          done

      - name: Dedupe CocoaPods embed outputs
        script: ruby im_demo/ios/dedupe_cocoapods_embed.rb im_demo/ios/Pods

      - name: Code signing (App Store)
        script: |
          set -eo pipefail
          cd im_demo/ios
          export BUNDLE_ID="com.hestia.n168chat.app.flutter.im"
          keychain initialize
          app-store-connect fetch-signing-files "${BUNDLE_ID}" --type IOS_APP_STORE --create
          keychain add-certificates
          xcode-project use-profiles \
            --project Runner.xcodeproj \
            --archive-method app-store \
            -v \
            --code-signing-setup-verbose-logging \
            --export-options-plist /Users/builder/export_options.plist

      - name: Build IPA
        script: |
          set -eo pipefail
          cd im_demo
          flutter build ipa --release --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - im_demo/build/ios/ipa/*.ipa
      - im_demo/ios/Podfile.lock
      - /tmp/xcodebuild_logs/*.log

    publishing:
      # 构建成功后的「发布」阶段：上传 IPA 并可提交 TestFlight（不占用构建机分钟计费的异步 Magic Actions）
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        # 可选：指定已存在的内测组名称，提交 beta 审核通过后自动分发给这些组
        # beta_groups:
        #   - 你的内测组名称
