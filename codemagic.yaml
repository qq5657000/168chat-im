workflows:
  ios-debug:
    name: iOS Debug Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
        working_directory: im_demo

      - name: Fix Podfile + Add Netease Source
        script: |
          cd im_demo/ios
          # 强制 iOS 13.0
          sed -i '' 's/^platform :ios.*/platform :ios, "13.0"/' Podfile
          # 添加网易私有源
          echo "source 'https://github.com/netease-kit/NEPodSpecs.git'" >> Podfile
          echo "source 'https://cdn.cocoapods.org/'" >> Podfile

      - name: Install pods
        script: |
          cd im_demo/ios
          rm -rf Pods Podfile.lock
          pod repo update
          pod install --repo-update

      - name: Build iOS
        script: flutter build ios --debug --no-codesign
        working_directory: im_demo

    artifacts:
      - im_demo/build/ios/iphoneos/Runner.app