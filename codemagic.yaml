workflows:
  ios-debug:
    name: iOS Debug Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
        working_directory: im_demo

      # 🔥 🔥 🔥 唯一能解决冲突的终极脚本
      - name: Force fix NERtcSDK version conflict
        script: |
          cd $CM_BUILD_DIR/im_demo
          
          # 1. 修复 callkit_ui → 去掉固定版本号，让它兼容所有版本
          find ios/.symlinks/plugins -name "netease_callkit_ui.podspec" | head -1 | xargs -I {} sed -i '' 's/NERtcSDK.*=.*5\.9\.11/NERtcSDK/g' {}
          
          # 2. 修复 Podfile 最低版本 iOS 13.0
          cd ios
          sed -i '' 's/^platform :ios.*/platform :ios, "13.0"/' Podfile

      - name: Clean and install pods
        script: |
          cd im_demo/ios
          rm -rf Pods Podfile.lock
          pod repo update
          pod install --repo-update

      - name: Build iOS
        script: flutter build ios --debug --no-codesign
        working_directory: im_demo

    artifacts:
      - im_demo/build/ios/iphoneos/Runner.app