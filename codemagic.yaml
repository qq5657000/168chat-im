workflows:
  ios-debug:
    name: iOS Debug Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
        working_directory: im_demo

      # 🔥 🔥 🔥 终极修复：全部统一用 5.9.11
      - name: Force all to NERtcSDK 5.9.11
        script: |
          cd $CM_BUILD_DIR/im_demo/ios
          
          # 1. 强制最低 iOS 13.0
          sed -i '' 's/^platform :ios.*/platform :ios, "13.0"/' Podfile
          
          # 2. 强制项目依赖 5.9.11
          echo "pod 'NERtcSDK', '5.9.11'" >> Podfile
          echo "pod 'NERoomKit', '1.44.0'" >> Podfile

      - name: Clean & Install Pods
        script: |
          cd im_demo/ios
          rm -rf Pods Podfile.lock
          pod repo update
          pod install --repo-update

      - name: Build iOS (no codesign)
        script: flutter build ios --debug --no-codesign
        working_directory: im_demo

    artifacts:
      - im_demo/build/ios/iphoneos/Runner.app
      - im_demo/build/ios/ipa/*.ipa