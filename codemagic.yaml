workflows:
  ios-debug:
    name: iOS Debug Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
        working_directory: im_demo

      # 👇 强制把 iOS 最低版本改成 13.0（解决 video_player 错误）
      - name: Set iOS deployment target to 13.0
        script: |
          cd im_demo/ios
          sed -i 's/platform :ios, .*/platform :ios, "13.0"/g' Podfile
          echo "pod 'NERtcSDK', '5.9.10'" >> Podfile

      - name: Clean and install pods
        script: |
          cd im_demo/ios
          rm -rf Pods Podfile.lock
          pod repo update
          pod install --repo-update

      - name: Build iOS (no codesign)
        script: flutter build ios --debug --no-codesign
        working_directory: im_demo

    artifacts:
      - im_demo/build/ios/ipa/*.ipa
      - im_demo/build/ios/iphoneos/*.app