workflows:
  ios-debug:
    name: iOS Debug Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
        working_directory: im_demo

      # 👇 终极修复：修改插件内部版本 + 强制iOS 13.0
      - name: Final fix all conflicts
        script: |
          cd im_demo
          
          # 1. 修改插件依赖，强制 5.9.10
          find .symlinks/plugins \
            \( -name "netease_callkit_ui.podspec" \) \
            -exec sed -i 's/5\.9\.11/5.9.10/g' {} \;

          # 2. 设置 iOS 最低版本 13.0
          cd ios
          sed -i 's/platform :ios.*/platform :ios, "13.0"/' Podfile

      - name: Clean and install pods
        script: |
          cd im_demo/ios
          rm -rf Pods Podfile.lock
          pod repo update
          pod install --repo-update

      - name: Build iOS (no codesign)
        script: flutter build ios --debug --no-codesign
        working_directory: im_demo

    artifacts:
      - im_demo/build/ios/iphoneos/Runner.app
      - im_demo/build/ios/ipa/*.ipa