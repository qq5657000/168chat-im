workflows:
  ios-debug:
    name: iOS Debug Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
        working_directory: im_demo

      # 修复 NERtcSDK 版本冲突
      - name: Align NERtcSDK to 5.9.10
        script: |
          set -euo pipefail
          ROOT="${CM_BUILD_DIR:-$(pwd)}"
          cd "$ROOT"
          patch_if_needed() {
            local dir="$1"
            [ -d "$dir" ] || return 0
            find "$dir" -type f -name "*.podspec" -path "*netease_callkit*" 2>/dev/null | while read -r f; do
              sed -i '' 's/5\.9\.11/5.9.10/g' "$f" 2>/dev/null
            done
          }
          patch_if_needed "$HOME/.pub-cache/hosted"
          patch_if_needed "im_demo/ios/.symlinks/plugins"

      - name: Clean Pods
        script: |
          cd im_demo/ios
          rm -rf Pods Podfile.lock

      - name: Install pods
        script: pod install --verbose
        working_directory: im_demo/ios

      # 🔥 🔥 🔥 关键：清除 Xcode 缓存 + 修复重复编译
      - name: Clean Xcode DerivedData
        script: |
          rm -rf ~/Library/Developer/Xcode/DerivedData
          cd im_demo
          flutter clean

      - name: Build iOS (no codesign)
        script: flutter build ios --debug --no-codesign --verbose
        working_directory: im_demo

    artifacts:
      - im_demo/build/ios/iphoneos/Runner.app