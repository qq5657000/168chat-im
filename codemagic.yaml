workflows:
  ios-debug:
    name: iOS Debug Build
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
        working_directory: im_demo

      # netease_callkit / netease_callkit_ui 的 podspec 可能固定 NERtcSDK 5.9.11，需与 netease_roomkit 的 5.9.10 对齐。
      # 勿用函数名 patch（与系统 patch 冲突）；勿在 CM_BUILD_DIR 未设置时用 set -u。
      - name: Fix NERtcSDK version conflict
        script: |
          set -eo pipefail
          REPO="${CM_BUILD_DIR:-.}"
          cd "$REPO"
          ner_patch_podspecs() {
            local dir="$1"
            [ -d "$dir" ] || return 0
            find "$dir" -type f \( -name 'netease_callkit.podspec' -o -name 'netease_callkit_ui.podspec' \) 2>/dev/null | while read -r f; do
              [ -f "$f" ] || continue
              grep -q '5\.9\.11' "$f" 2>/dev/null || continue
              echo "PATCH: $f"
              sed -i '' 's/5\.9\.11/5.9.10/g' "$f"
            done
          }
          ner_patch_podspecs "$HOME/.pub-cache/hosted"
          ner_patch_podspecs "im_demo/ios/.symlinks/plugins"

      - name: Clean & Install Pods
        script: |
          set -eo pipefail
          cd im_demo/ios
          rm -rf Pods Podfile.lock
          for attempt in 1 2 3; do
            if pod install; then
              break
            fi
            echo "pod install failed (attempt $attempt), retry in 25s..."
            sleep 25
            [ "$attempt" -eq 3 ] && exit 1
          done

      - name: Dedupe CocoaPods embed outputs
        script: ruby im_demo/ios/dedupe_cocoapods_embed.rb im_demo/ios/Pods

      # 构建前再 pod install + 去重：flutter build 会再次执行 pod install，需在 xcodebuild 前最后一次修正
      - name: Build iOS
        script: |
          set -eo pipefail
          cd im_demo/ios
          pod install
          ruby dedupe_cocoapods_embed.rb Pods
          cd ..
          flutter build ios --debug --no-codesign

    artifacts:
      - im_demo/build/ios/iphoneos/Runner.app
