workflows:
  ios-debug:
    name: iOS Debug Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
        working_directory: im_demo

      # 🔥 终极修复：路径正确 + macOS sed 兼容 + 版本统一
      - name: Fix plugin version & iOS 13.0
        script: |
          # 修复 callkit_ui 版本 5.9.11 → 5.9.10
          cd $CM_BUILD_DIR/im_demo
          find ios/.symlinks/plugins -name "netease_callkit_ui.podspec" -exec sed -i '' 's/5\.9\.11/5.9.10/g' {} \;
          
          # 强制设置 iOS 13.0
          cd ios
          sed -i '' 's/^platform :ios.*/platform :ios, "13.0"/' Podfile

      - name: Install pods
        script: |
          cd im_demo/ios
          rm -rf Pods Podfile.lock
          pod repo update
          pod install --repo-update

      - name: Build iOS
        script: flutter build ios --debug --no-codesign
        working_directory: im_demo

    artifacts:
      - im_demo/build/ios/iphoneos/Runner.app
      - im_demo/build/ios/ipa/*.ipa