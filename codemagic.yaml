workflows:
  ios-debug:
    name: iOS Debug Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter dependencies
        script: flutter pub get
        working_directory: im_demo

      # 👇 只做一件安全的事：强制 iOS 13.0（不碰任何源、不碰任何版本）
      - name: Set iOS deployment target to 13.0
        script: |
          cd im_demo/ios
          sed -i '' 's/^platform :ios.*/platform :ios, "13.0"/' Podfile

      - name: Clean CocoaPods
        script: |
          cd im_demo/ios
          rm -rf Pods Podfile.lock
          pod repo update

      - name: Install pods
        script: pod install
        working_directory: im_demo/ios

      - name: Build iOS without codesign
        script: flutter build ios --debug --no-codesign
        working_directory: im_demo

    artifacts:
      - im_demo/build/ios/iphoneos/Runner.app