workflows:
  ios-debug:
    name: iOS Debug Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
        working_directory: im_demo

      # 👇 强制在 Podfile 里插入固定版本，彻底解决冲突
      - name: Force fix NERtcSDK in Podfile
        script: |
          echo "=== 强制锁定 NERtcSDK 版本 ==="
          cd im_demo/ios
          echo "pod 'NERtcSDK', '5.9.10'" >> Podfile
          cat Podfile

      - name: Clean Pods & Install
        script: |
          cd im_demo/ios
          rm -rf Pods Podfile.lock
          pod repo update
          pod install --repo-update

      - name: Build iOS (no codesign)
        script: flutter build ios --debug --no-codesign
        working_directory: im_demo

    artifacts:
      - im_demo/build/ios/ipa/*.ipa
      - im_demo/build/ios/iphoneos/*.app