workflows:
  ios-ipa:
    name: iOS Release IPA (蒲公英专用 - 无签名)
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: 16.0
      cocoapods: default

    scripts:
      - name: Get Flutter packages
        script: flutter pub get
        working_directory: im_demo

      - name: Patch roomkit podspec NEXKitBase
        script: |
          set -eo pipefail
          patch_roomkit_podspec() {
            local file="$1"
            [ -f "$file" ] || return 0
            if grep -q "s.dependency 'NEXKitBase'" "$file"; then
              echo "NEXKitBase already exists: $file"
              return 0
            fi
            if grep -q 's.dependency "NERoomKit/Base_FCS_Special", "1.43.0"' "$file"; then
              awk '{print} /s.dependency "NERoomKit\/Base_FCS_Special", "1.43.0"/ {print "      s.dependency '\''NEXKitBase'\''"}' "$file" > "$file.tmp"
              mv "$file.tmp" "$file"
              echo "PATCHED: $file"
            fi
          }
          patch_roomkit_podspec "$HOME/.pub-cache/hosted/pub.dev/netease_roomkit-1.43.0/ios/netease_roomkit.podspec"
          patch_roomkit_podspec "im_demo/ios/.symlinks/plugins/netease_roomkit/ios/netease_roomkit.podspec"

      - name: Clean & Install Pods
        script: |
          cd im_demo/ios
          rm -rf Pods Podfile.lock
          pod install

      - name: Dedupe CocoaPods embed outputs
        script: ruby im_demo/ios/dedupe_cocoapods_embed.rb im_demo/ios/Pods

      # 无签名打包
      - name: Build unsigned IPA
        script: |
          cd im_demo
          flutter build ios --release --no-codesign
          mkdir -p build/ios/ipa
          cp build/ios/iphoneos/Runner.app build/ios/ipa/
          cd build/ios
          zip -r ipa/Runner.ipa iphoneos

    artifacts:
      - im_demo/build/ios/ipa/*.ipa

    publishing:
      scripts:
        - name: Upload to PGYER
          script: |
            IPA_PATH="$CM_BUILD_DIR/im_demo/build/ios/ipa/Runner.ipa"
            echo "上传IPA: $IPA_PATH"
            curl -F "file=@$IPA_PATH" \
            -F "_api_key=64da53cb5abab89565c027d5426ba36a" \
            https://upload.pgyer.com/apiv2/app/upload